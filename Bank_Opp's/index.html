<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPP BANK MANAGEMENT SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"  async ></script>
</head>
<body>
    <div class="container">
        <h1>Simple Bank Prototype</h1>
        <section class="card">
            <h2>Enter Customer Details</h2>
            <form  id="createCustomerForm">
                <input type = "text" placeholder="Enter Customer Name" id="customerName" required />
                <input type =  "text" placeholder="Enter Customer Email" id="email" required/>
                <button type="submit">Submit</button>
            </form>
          
        </section>

        <section class="button" >
            <button id="showCustomerDetail" >Show All Customer Detail</button>
            <button id="hideCustomerDetail">Hide Hide All Customer Details</button>
        </section>
    
        <section class="card hidden" id="customerDetailSection">
            <div class="details" id="customer-detail">
        
            </div>
        
        </section>

    <section class="card">
            <h2>Create Account</h2>
            <form  id="createAccountForm">
                <input type = "text" placeholder="Enter Customer id" id="customerId" required />
                <input type =  "number" placeholder="Enter Deposit Amount" id="deposit" required/>
                <button type="submit">Submit</button>
            </form>
          
    </section>

    <section class="button" >
        <button id="showAccountDetail" >Show All Account Details</button>
        <button id="hideAccountDetail">Hide Hide All Account Details</button>
    </section>

     <section class="card hidden" id="accountDetailSection">
            <div class="details" id="account-detail">
        
            </div>
        
    </section>

    <section class="card">
        <h2>Banking Oepration</h2>
        <div class="operations">
            <div class="operation-box">
                    <h3>Deposit Money</h3>
                    <select id="depositAccount" class="account-select">
                        <option value="">Select Account</option>
                    </select>
                    <input type="number" id="depositAmount" placeholder="Amount" min="0" step="0.01">
                    <button onclick="performDeposit()">Deposit</button>
                </div>

                <div class="operation-box">
                    <h3>Withdraw Money</h3>
                    <select id="withdrawAccount" class="account-select">
                        <option value="">Select Account</option>
                    </select>
                    <input type="number" id="withdrawAmount" placeholder="Amount" min="0" step="0.01">
                    <button onclick="performWithdraw()">Withdraw</button>
                </div>
            

           
        </div>
    </section>

    <section class="card">
        <h2>Customer Transaction</h2>
        <input type="text" placeholder="Enter Account Number" id="accNum"/>
        <button onClick="showTransactions()">Show Transctions</button>
        <div id="trans">

        </div>

    </section>

      <!-- Messages -->
        <div id="message" class="message"></div>

    </div>
    
</body>
</html>
